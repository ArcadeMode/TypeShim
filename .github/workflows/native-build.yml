name: native-generator

on:
  workflow_dispatch:
  push:
    branches:
      - ship-native-binaries

jobs:
  build:
    name: ${{ matrix.rid }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            rid: linux-x64
          - os: ubuntu-24.04
            rid: linux-musl-x64
          - os: ubuntu-24.04-arm
            rid: linux-musl-arm64
          - os: ubuntu-24.04-arm
            rid: linux-arm64
          - os: windows-latest
            rid: win-x64
          - os: windows-latest
            rid: win-x86
          - os: windows-latest
            rid: win-arm64
          - os: macos-latest
            rid: osx-x64
          - os: macos-latest
            rid: osx-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: src/global.json
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src/TypeShim.E2E/vitest/package-lock.json

      - name: Build core
        shell: pwsh
        working-directory: src
        run: |
          ./TypeShim/build.ps1
    
      - name: Build native generator
        shell: pwsh
        working-directory: src
        run: |
          if ("${{ runner.os }}" -eq "Linux") {
            ./TypeShim/build-native.linux.ps1 -RID '${{ matrix.rid }}'
          } else {
            ./TypeShim/build-native.ps1 -RID '${{ matrix.rid }}'
          }

      - name: Run E2E
        if: ${{ !cancelled() }}
        uses: ./.github/actions/run-e2e
        with:
          working-directory: src/TypeShim.E2E/vitest
          artifact-name: e2e-report
          rid: ${{ matrix.rid }}

      - name: Upload RID artifact
        uses: actions/upload-artifact@v4
        with:
          name: pack-build-${{ matrix.rid }}
          path: src/TypeShim/bin/pack/build/${{ matrix.rid }}**
          if-no-files-found: error

  combine:
    name: combine-pack
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all RID artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pack-build-*
          path: pack
          merge-multiple: true

      - name: Upload combined pack directory
        uses: actions/upload-artifact@v4
        with:
          name: typeshim-pack
          path: pack/**
